<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إضافة طالب</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="page-bg">

<h1 class="page-title">➕ إضافة طالب جديد</h1>

<form method="post" enctype="multipart/form_data" class="form-card">
    {% csrf_token %}
    {{ form.as_p }}

    <input type="text" name="name" placeholder="اسم الطالب" required>
    <select name="gender">
        <option>ذكر</option>
        <option>أنثى</option>
    </select>

    <input type="date" name="date_of_birth" required>
    <input type="number" name="total_grade" placeholder="المجموع">
    <input type="text" name="status" placeholder="الحالة">

    <button class="glass-btn">💾 حفظ</button>
</form>

<a href="/students/" class="back-btn">⬅ العودة</a>

</body>
</html>
