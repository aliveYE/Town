{% load static i18n %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{% trans "إضافة طالب" %}</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="page-bg">

<h1 class="page-title">➕ {% trans "إضافة طالب جديد" %}</h1>

<form method="post" enctype="multipart/form-data" class="form-card">
    {% csrf_token %}

    <!-- Django Form -->
    {{ form.as_p }}

    <button type="submit" class="glass-btn">💾 {% trans "حفظ" %}</button>
</form>

<a href="{% url 'students' %}" class="back-btn">⬅ {% trans "العودة" %}</a>

</body>
</html>
