<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طلاب الصف السادس</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="page-bg">

<h1 class="page-title">👨‍🎓 طلاب الصف السادس الابتدائي</h1>

<div class="top-actions">
    <a href="/add-student/" class="glass-btn small-btn">➕ إضافة طالب</a>
    <a href="/grade/" class="glass-btn small-btn">📊 لوحة الصف</a>
</div>

<form method="get" class="search-bar">
    <input type="text" name="q" placeholder="🔎 البحث عن اسم الطالب..." value="{{ request.GET.q }}">
    <button type="submit">بحث</button>
</form>

<div class="student-list">
    {% for student in students %}
        <a href="/student/{{ student.id }}/" class="student-card">
            <div class="student-info">
                <span class="student-name">{{ student.name }}</span>
                <span class="student-status">{{ student.status }}</span>
            </div>

            <div class="student-grade">
                {{ student.total_grade }}%
            </div>
        </a>
    {% empty %}
        <p style="text-align:center;">لا يوجد طلاب</p>
    {% endfor %}
</div>

<a href="/home/" class="back-btn">⬅ العودة إلى الرئيسية</a>

</body>
</html>
